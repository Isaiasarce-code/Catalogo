<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo Productos deshidratados</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script> <!-- PapaParse CDN -->
</head>

<body>
    <!-- Botón flotante del carrito mium -->
    <button id="cartButton" class="cart-button">
        🛒 <span id="cartCount">0</span>
    </button>

    <!-- Panel lateral del carrito -->
    <div id="cartSidebar" class="cart-sidebar">
        <div class="cart-header">
            <h2>Carrito</h2>
            <button id="closeCart" class="close-cart-btn">&times;</button>
        </div>

        <div id="cartItems" class="cart-items">
            <p class="empty-cart">Tu carrito está vacío.</p>
        </div>

        <div class="cart-footer">
            <h3>Total: $<span id="cartTotal">0</span></h3>
            <button class="clear-cart-btn" onclick="openOrderSummary()">Ver resumen de pedido</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <header>
        ...
    </header>

    <header>
        <img src="images/logo.jpg" alt="Logo de Pewter Essence" class="logo">
        <h1>Productos deshidratados</h1>
        <p> “La fruta como más se disfruta.” <br/> La esencia de la fruta, en su forma más pura.  Una experiencia natural, deliciosa y artesanal.</p>
    </header>
    

    <main>
        <!-- Contenedor de controles de búsqueda y ordenamiento -->
        <div class="controls">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Buscar producto..." />
                <button id="searchButton" aria-label="Buscar">🔍</button>
            </div>
            <div class="sort-container">
                <label for="sortSelect">Ordenar por:</label>
                <select id="sortSelect">
                    <option value="nombre">Nombre</option>
                    <option value="precioAscendente">Precio: Menor a Mayor</option>
                    <option value="precioDescendente">Precio: Mayor a Menor</option>
                </select>
            </div>
        </div>

        <section class="catalog" id="catalog"></section> <!-- Sección del catálogo de productos -->
    </main>

    <!-- Modal para mostrar imágenes en tamaño completo -->

    <div id="imageModal" class="modal">
        <div class="modal-box">
            <button class="close" aria-label="Cerrar modal">&times;</button>

            <div class="modal-image-wrapper">
                <img class="modal-content" id="modalImage">
            </div>

            <div class="modal-caption" id="modalCaption"></div>

            <button class="mobile-close-btn" onclick="closeImageModal()">Cerrar</button>
        </div>
    </div>

    <div id="orderSummaryModal" class="summary-modal">
        <div class="summary-modal-box">
            <div class="summary-header">
                <h2>Resumen de pedido</h2>
                <button id="closeSummaryBtn" class="summary-close-btn" aria-label="Cerrar resumen">&times;</button>
            </div>

            <div id="summaryContent" class="summary-content"></div>

            <div class="summary-actions">
                <button class="secondary-btn" onclick="closeOrderSummary()">Cerrar</button>
                <button class="whatsapp-btn" onclick="sendOrderWhatsApp()">Mandar pedido por WhatsApp</button>
                <button class="danger-btn" onclick="clearCartFromSummary()">Vaciar carrito</button>
            </div>
        </div>
    </div>


    <footer>
        <p>&copy; 2025 Productos deshidratados. Todos los derechos reservados.</p>
    </footer>

    <!-- Script para cargar y procesar el archivo CSV -->
    <script>
        let products = [];
        let cart = [];
    
        async function loadCSV() {
            try {
                const response = await fetch('productos.csv');
                if (!response.ok) {
                    throw new Error(`Error al cargar el archivo CSV: ${response.status}`);
                }
    
                const csvText = await response.text();
    
                Papa.parse(csvText, {
                    header: true,
                    complete: function(results) {
                        products = results.data.map(product => {
                            const cleanProduct = {};
    
                            for (const key in product) {
                                cleanProduct[key.trim()] = product[key] ? product[key].trim() : '';
                            }
    
                            if (cleanProduct.id && cleanProduct.nombre) {
                                cleanProduct.precio = cleanProduct.precio
                                    ? parseFloat(cleanProduct.precio.replace('$', '').replace(/,/g, ''))
                                    : 0;
    
                                cleanProduct.factorCrudo = cleanProduct.factorCrudo
                                    ? parseFloat(cleanProduct.factorCrudo.replace('$', '').replace(/,/g, ''))
                                    : 0;
    
                                cleanProduct.precio50 = cleanProduct.precio50
                                    ? parseFloat(cleanProduct.precio50.replace('$', '').replace(/,/g, ''))
                                    : 0;
    
                                cleanProduct.precio125 = cleanProduct.precio125
                                    ? parseFloat(cleanProduct.precio125.replace('$', '').replace(/,/g, ''))
                                    : 0;
    
                                cleanProduct.precio250 = cleanProduct.precio250
                                    ? parseFloat(cleanProduct.precio250.replace('$', '').replace(/,/g, ''))
                                    : 0;
    
                                cleanProduct.precio500 = cleanProduct.precio500
                                    ? parseFloat(cleanProduct.precio500.replace('$', '').replace(/,/g, ''))
                                    : 0;
    
                                cleanProduct.precio1000 = cleanProduct.precio1000
                                    ? parseFloat(cleanProduct.precio1000.replace('$', '').replace(/,/g, ''))
                                    : 0;
    
                                return cleanProduct;
                            }
    
                            return null;
                        }).filter(Boolean);
    
                        searchProducts();
                    },
                    error: function(error) {
                        console.error('Error al procesar el CSV:', error);
                    }
                });
    
            } catch (error) {
                console.error('Error al cargar el archivo CSV:', error);
            }
        }
    
        function displayProducts(productsToDisplay) {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = '';
    
            if (productsToDisplay.length === 0) {
                catalog.innerHTML = '<p class="no-results">No se encontraron productos que coincidan con su búsqueda.</p>';
                return;
            }
    
            productsToDisplay.forEach((product) => {
                const productElement = document.createElement('article');
                productElement.className = 'product';
    
                const imageContainer = document.createElement('div');
                imageContainer.className = 'product-image-container';
    
                const imagePlaceholder = document.createElement('div');
                imagePlaceholder.className = 'image-placeholder';
                imagePlaceholder.innerHTML = '<p>Cargando imagen...</p>';
    
                const productImage = document.createElement('img');
                productImage.className = 'product-image';
                productImage.alt = product.nombre || 'Producto';
                productImage.loading = 'lazy';
    
                function showImageFast() {
                    imagePlaceholder.style.display = 'none';
                    productImage.style.display = 'block';
                    productImage.classList.add('loaded');
                    productImage.style.opacity = '1';
                    productImage.style.transition = 'none';
                }
    
                productImage.style.opacity = '0';
    
                productImage.addEventListener('load', function() {
                    showImageFast();
                }, { once: true });
    
                productImage.addEventListener('error', function() {
                    imagePlaceholder.innerHTML = '<p>Imagen no disponible</p>';
                    imagePlaceholder.style.display = 'flex';
                    this.style.display = 'none';
                }, { once: true });
    
                productImage.src = `images/product${product.id}.jpg`;
    
                if (productImage.complete) {
                    showImageFast();
                }
    
                imageContainer.appendChild(imagePlaceholder);
                imageContainer.appendChild(productImage);
    
                productElement.innerHTML = `
                    <h2>${product.nombre || 'Sin nombre'}</h2>
                    <p>${product.descripción || 'No description available'}</p>
                    <span class="price">$${Number(product.precio || 0).toFixed(2)}</span>
                `;
    
                productElement.insertBefore(imageContainer, productElement.firstChild);
    
                productElement.addEventListener('click', () => openImageModal(product));
    
                catalog.appendChild(productElement);
            });
        }
    
        function openImageModal(product) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            const captionText = document.getElementById('modalCaption');
    
            const presentaciones = [
                { gramos: '50gr', precio: product.precio50 },
                { gramos: '125gr', precio: product.precio125 },
                { gramos: '250gr', precio: product.precio250 },
                { gramos: '500gr', precio: product.precio500 },
                { gramos: '1000gr', precio: product.precio1000 }
            ];
    
            const filasTabla = presentaciones.map((item, index) => `
                <tr>
                    <td>${item.gramos}</td>
                    <td>$${Number(item.precio || 0).toFixed(2)}</td>
                    <td>
                        <input 
                            type="number" 
                            min="1" 
                            value="1" 
                            id="cantidad-${product.id}-${index}" 
                            class="qty-input"
                        >
                    </td>
                    <td>
                        <button 
                            class="table-cart-btn"
                            onclick="event.stopPropagation(); addToCart('${product.id}', '${item.gramos}', '${item.precio}', ${index})"
                        >
                            Agregar
                        </button>
                    </td>
                </tr>
            `).join('');
    
            const tablaPrecios = `
                <table class="price-table">
                    <thead>
                        <tr>
                            <th>Cantidad gr</th>
                            <th>Precio</th>
                            <th>Cantidad</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filasTabla}
                    </tbody>
                </table>
            `;
    
            const tablaCrudo = `
                <table class="raw-price-table">
                    <thead>
                        <tr>
                            <th>Peso en crudo (kg)</th>
                            <th>Precio</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <input 
                                    type="number" 
                                    min="0.1" 
                                    step="0.01" 
                                    value="" 
                                    placeholder="Ej. 5.3"
                                    id="peso-crudo-${product.id}" 
                                    class="qty-input"
                                    oninput="calculateRawPrice('${product.id}')"
                                    onclick="event.stopPropagation()"
                                >
                            </td>
                            <td id="precio-crudo-${product.id}">$0.00</td>
                            <td>
                                <button 
                                    class="table-cart-btn"
                                    onclick="event.stopPropagation(); addRawToCart('${product.id}')"
                                >
                                    Agregar
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            `;
    
            captionText.innerHTML = `
                <strong>${product.nombre || 'Sin nombre'}</strong>
                <br>
                <p>${product.descripción || ''}</p>
                <br>
                ${tablaPrecios}
                <br>
                ${tablaCrudo}
            `;
    
            modal.style.display = 'block';
    
            modalImg.style.opacity = '0';
            modalImg.style.display = 'block';
    
            const modalLoadingAnterior = modal.querySelector('.modal-loading');
            if (modalLoadingAnterior) {
                modalLoadingAnterior.remove();
            }
    
            const modalLoading = document.createElement('div');
            modalLoading.className = 'modal-loading';
            modalLoading.innerHTML = '<div class="loading-spinner"></div>';
            modalImg.parentElement.insertBefore(modalLoading, modalImg);
    
            const tempImg = new Image();
            tempImg.onload = function() {
                modalImg.src = this.src;
                modalImg.alt = product.nombre || 'Product';
                modalImg.style.opacity = '1';
                if (modalLoading.parentElement) {
                    modalLoading.remove();
                }
            };
    
            tempImg.onerror = function() {
                modalImg.style.display = 'none';
                modalLoading.innerHTML = '<p style="color: white; text-align: center;">Error al cargar la imagen</p>';
            };
    
            tempImg.src = `images/product${product.id}.jpg`;
        }
    
        function calculateRawPrice(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
    
            const input = document.getElementById(`peso-crudo-${productId}`);
            const priceCell = document.getElementById(`precio-crudo-${productId}`);
    
            const pesoCrudo = parseFloat(input.value);
            const factorCrudo = parseFloat(product.factorCrudo);
    
            if (isNaN(pesoCrudo) || pesoCrudo <= 0 || isNaN(factorCrudo) || factorCrudo <= 0) {
                priceCell.textContent = '$0.00';
                return;
            }
    
            const total = pesoCrudo * factorCrudo;
            priceCell.textContent = `$${total.toFixed(2)}`;
        }
    
        function addRawToCart(productId) {
            const product = products.find(p => p.id === productId);
    
            if (!product) {
                alert('Producto no encontrado');
                return;
            }
    
            const input = document.getElementById(`peso-crudo-${productId}`);
            const pesoCrudo = parseFloat(input.value);
            const factorCrudo = parseFloat(product.factorCrudo);
    
            if (isNaN(pesoCrudo) || pesoCrudo <= 0) {
                alert('Ingresa un peso en crudo válido');
                return;
            }
    
            if (isNaN(factorCrudo) || factorCrudo <= 0) {
                alert('No se encontró el factor de precio en crudo para este producto');
                return;
            }
    
            const total = pesoCrudo * factorCrudo;
            const presentacion = `Crudo ${pesoCrudo} kg`;
    
            const existingItem = cart.find(item =>
                item.productId === `${productId}-crudo` && item.gramos === presentacion
            );
    
            if (existingItem) {
                existingItem.cantidad += 1;
                existingItem.total = existingItem.cantidad * existingItem.precio;
            } else {
                cart.push({
                    productId: `${productId}-crudo`,
                    nombre: product.nombre,
                    descripcion: product.descripción || '',
                    gramos: presentacion,
                    cantidad: 1,
                    precio: total,
                    total: total
                });
            }
    
            updateCartUI();
            showToast(`${product.nombre} (${pesoCrudo} kg en crudo) agregado al carrito`);
        }
    
        function closeImageModal() {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            const modalLoading = modal.querySelector('.modal-loading');
    
            if (modalLoading) {
                modalLoading.remove();
            }
    
            modalImg.src = '';
            modalImg.style.opacity = '0';
            modalImg.style.display = 'block';
            modal.style.display = 'none';
        }
    
        function searchProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const sortBy = document.getElementById('sortSelect').value;
    
            let filteredProducts = products;
    
            if (searchTerm) {
                filteredProducts = products.filter(product => {
                    const nombre = (product.nombre || '').toLowerCase();
                    const descripcion = (product.descripción || '').toLowerCase();
                    return nombre.includes(searchTerm) || descripcion.includes(searchTerm);
                });
            }
    
            let sortedProducts = [...filteredProducts];
    
            if (sortBy === 'nombre') {
                sortedProducts.sort((a, b) => a.nombre.localeCompare(b.nombre));
            } else if (sortBy === 'precioAscendente') {
                sortedProducts.sort((a, b) => (a.precio || 0) - (b.precio || 0));
            } else if (sortBy === 'precioDescendente') {
                sortedProducts.sort((a, b) => (b.precio || 0) - (a.precio || 0));
            }
    
            displayProducts(sortedProducts);
        }
    
        function sortProducts() {
            searchProducts();
        }
    
        function addToCart(productId, gramos, precio, index) {
            const product = products.find(p => p.id === productId);
    
            if (!product) {
                alert('Producto no encontrado');
                return;
            }
    
            const inputCantidad = document.getElementById(`cantidad-${productId}-${index}`);
            const cantidad = parseInt(inputCantidad.value);
    
            if (!cantidad || cantidad < 1) {
                alert('Ingresa una cantidad válida');
                return;
            }
    
            const precioUnitario = parseFloat(precio);
    
            if (isNaN(precioUnitario)) {
                alert('Precio no válido');
                return;
            }
    
            const existingItem = cart.find(item =>
                item.productId === productId && item.gramos === gramos
            );
    
            if (existingItem) {
                existingItem.cantidad += cantidad;
                existingItem.total = existingItem.cantidad * existingItem.precio;
            } else {
                cart.push({
                    productId,
                    nombre: product.nombre,
                    descripcion: product.descripción || '',
                    gramos,
                    cantidad,
                    precio: precioUnitario,
                    total: cantidad * precioUnitario
                });
            }
    
            updateCartUI();
            showToast(`${product.nombre} (${gramos}) - ${cantidad} ${cantidad === 1 ? 'pieza agregada' : 'piezas agregadas'} al carrito`);
        }
    
        function updateCartUI() {
            const cartItemsContainer = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const cartTotal = document.getElementById('cartTotal');
    
            cartItemsContainer.innerHTML = '';
    
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p class="empty-cart">Tu carrito está vacío.</p>';
                cartCount.textContent = '0';
                cartTotal.textContent = '0';
                return;
            }
    
            let totalGeneral = 0;
            let totalPiezas = 0;
    
            cart.forEach((item, index) => {
                totalGeneral += item.total;
                totalPiezas += item.cantidad;
    
                const itemElement = document.createElement('div');
                itemElement.className = 'cart-item';
    
                itemElement.innerHTML = `
                    <h4>${item.nombre}</h4>
                    <p><strong>Presentación:</strong> ${item.gramos}</p>
                    <p><strong>Cantidad:</strong> ${item.cantidad}</p>
                    <p><strong>Precio unitario:</strong> $${Number(item.precio).toFixed(2)}</p>
                    <p><strong>Total:</strong> $${Number(item.total).toFixed(2)}</p>
                    <button class="remove-item-btn" onclick="removeFromCart(${index})">Eliminar</button>
                `;
    
                cartItemsContainer.appendChild(itemElement);
            });
    
            cartCount.textContent = totalPiezas;
            cartTotal.textContent = totalGeneral.toFixed(2);
        }
    
        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
            showToast('Producto eliminado del carrito');
        }
    
        function clearCart() {
            cart = [];
            updateCartUI();
            showToast('Carrito vaciado');
        }
    
        function openOrderSummary() {
            const modal = document.getElementById('orderSummaryModal');
            const summaryContent = document.getElementById('summaryContent');
    
            if (cart.length === 0) {
                summaryContent.innerHTML = `<p class="empty-summary">Tu carrito está vacío.</p>`;
                modal.style.display = 'flex';
                return;
            }
    
            let totalGeneral = 0;
    
            const rows = cart.map(item => {
                totalGeneral += item.total;
                return `
                    <tr>
                        <td>${item.nombre}</td>
                        <td>${item.gramos}</td>
                        <td>${item.cantidad}</td>
                        <td>$${Number(item.precio).toFixed(2)}</td>
                        <td>$${Number(item.total).toFixed(2)}</td>
                    </tr>
                `;
            }).join('');
    
            summaryContent.innerHTML = `
                <div class="summary-table-wrapper">
                    <table class="summary-table">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Presentación</th>
                                <th>Cantidad</th>
                                <th>Precio unitario</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows}
                        </tbody>
                        <tfoot>
                            <tr>
                                <td colspan="4"><strong>Total general</strong></td>
                                <td><strong>$${totalGeneral.toFixed(2)}</strong></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            `;
    
            modal.style.display = 'flex';
        }
    
        function closeOrderSummary() {
            document.getElementById('orderSummaryModal').style.display = 'none';
        }
    
        function clearCartFromSummary() {
            clearCart();
            closeOrderSummary();
            showToast('Carrito vaciado');
        }
    
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
    
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2200);
        }
    
        function openCart() {
            document.getElementById('cartSidebar').classList.add('open');
        }
    
        function closeCart() {
            document.getElementById('cartSidebar').classList.remove('open');
        }
    
        function generateOrderText() {
            if (cart.length === 0) {
                return encodeURIComponent('Hola, quiero hacer un pedido, pero el carrito está vacío.');
            }
    
            let totalGeneral = 0;
            let message = 'Hola, quiero hacer el siguiente pedido:\n\n';
    
            cart.forEach((item, index) => {
                totalGeneral += item.total;
    
                message += `${index + 1}. ${item.nombre} - ${item.gramos}\n`;
                message += `Cantidad: ${item.cantidad}\n`;
                message += `Precio unitario: $${Number(item.precio).toFixed(2)}\n`;
                message += `Total: $${Number(item.total).toFixed(2)}\n\n`;
            });
    
            message += `Total general: $${totalGeneral.toFixed(2)}`;
    
            return encodeURIComponent(message);
        }
    
        function sendOrderWhatsApp() {
            if (cart.length === 0) {
                alert('Tu carrito está vacío');
                return;
            }
    
            const phoneNumber = '5214425624506';
            const message = generateOrderText();
            const url = `https://wa.me/${phoneNumber}?text=${message}`;
    
            window.open(url, '_blank');
        }
    
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('sortSelect').addEventListener('change', sortProducts);
            document.getElementById('searchButton').addEventListener('click', searchProducts);
    
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchProducts();
                }
            });
    
            document.getElementById('searchInput').addEventListener('input', searchProducts);
    
            const closeBtn = document.querySelector('.close');
            if (closeBtn) {
                closeBtn.addEventListener('click', closeImageModal);
            }
    
            const closeSummaryBtn = document.getElementById('closeSummaryBtn');
            if (closeSummaryBtn) {
                closeSummaryBtn.addEventListener('click', closeOrderSummary);
            }
    
            window.addEventListener('click', function(event) {
                const imageModal = document.getElementById('imageModal');
                const summaryModal = document.getElementById('orderSummaryModal');
    
                if (event.target === imageModal) {
                    closeImageModal();
                }
    
                if (event.target === summaryModal) {
                    closeOrderSummary();
                }
            });
    
            loadCSV();
        });
    </script>
</body>
</html>
